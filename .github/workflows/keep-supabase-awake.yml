name: Keep Supabase Awake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping public posts endpoint
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          BASE_URL="${SITE_URL:-https://infonet-flax.vercel.app}"
          TARGET_URL="${BASE_URL%/}/api/public/posts?limit=1"

          echo "Pinging: $TARGET_URL"

          for attempt in 1 2 3; do
            status_code=$(curl -sS -o response.json -w "%{http_code}" "$TARGET_URL" || true)
            echo "Attempt $attempt status: $status_code"

            if [ "$status_code" = "200" ]; then
              echo "Keep-alive ping succeeded."
              exit 0
            fi

            sleep 20
          done

          echo "Keep-alive ping failed after retries."
          echo "Response body:"
          cat response.json || true
          exit 1
